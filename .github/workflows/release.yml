# This workflow will do a clean installation of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Update Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # update version and download link in module.json
      - name: Read version from package.json
        id: read_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Warn if release name doesn't match package.json version
        if: ${{ github.event.release.target_commitish == 'main' }}
        run: |
          EXPECTED="v${{ steps.read_version.outputs.version }}"
          ACTUAL="${{ github.event.release.name }}"

          if [ -z "$ACTUAL" ]; then
            echo "::warning title=Release name missing::Expected release name '$EXPECTED' but release name is empty."
            exit 0
          fi

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::warning title=Release name/version mismatch::Expected release name '$EXPECTED' (from package.json) but got '$ACTUAL'."
            exit 0
          fi

      - name: Update module.json version and download link
        id: update_module_version
        uses: cschleiden/replace-tokens@v1
        with:
          files: './static/module.json'
        env:
          DOWNLOAD: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.zip
          VERSION: ${{ steps.read_version.outputs.version }}

      # install dependencies and build
      - run: npm ci
      - name: Build (debug for prerelease branches)
        run: |
          if [ "${{ github.event.release.target_commitish }}" != "main" ]; then
            npm run debug
          else
            npm run build
          fi

      # save the output folder for release job
      - name: Archive dist folder
        uses: actions/upload-artifact@v4
        with:
          name: module-download
          path: dist/
      - name: Archive module json
        uses: actions/upload-artifact@v4
        with:
          name: module
          path: ./static/module.json 

  # Create a release with the module.json and the module.zip file
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download module download file
        uses: actions/download-artifact@v4
        with:
          name: module-download
          path: module-download
      
      - name: Download module.json
        uses: actions/download-artifact@v4
        with:
          name: module
      
      # Create a zip file with all files required by the module to add to the release
      - run: (cd module-download; zip -r ../module.zip .)

      # Check if this is a prerelease (not main branch)
      - name: Check if prerelease
        id: check-prerelease
        run: |
          if [ "${{ github.event.release.target_commitish }}" != "main" ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      # update the release with the new files
      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true # Set this to false if you want to prevent updating existing releases
          name: ${{ github.event.release.name }}
          draft: false
          prerelease: ${{ steps.check-prerelease.outputs.prerelease }}
          token: ${{ secrets.RELEASE_TOKEN }}  # needs access to repo scope in classic tokens
          artifacts: './module.json, ./module.zip'
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
  
  