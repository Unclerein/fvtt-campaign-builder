name: Release Perso

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la release (ex: v1.10.2-perso)'
        required: true
        default: 'v1.10.2-perso'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: claude/fix-notes-enricher-links-wVj4m

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch module.json (version + download URL)
        run: |
          TAG="${{ inputs.tag }}"
          DOWNLOAD="https://github.com/${{ github.repository }}/releases/download/${TAG}/module.zip"
          sed -i "s|\#{VERSION}#|${TAG}|g" static/module.json
          sed -i "s|\#{DOWNLOAD}#|${DOWNLOAD}|g" static/module.json

      - name: Install dependencies
        run: npm ci

      - name: Build module
        run: npm run build
        env:
          GH_PROJECT: ${{ github.repository }}
          GH_TAG: ${{ inputs.tag }}

      - name: Zip dist folder
        run: cd dist && zip -r ../module.zip . && cd ..

      - name: Create GitHub Release
        run: |
          gh release create "${{ inputs.tag }}" \
            ./dist/module.json \
            ./module.zip \
            --title "${{ inputs.tag }}" \
            --prerelease \
            --notes "Release personnalisée avec le fix des liens enrichisseurs dans les notes de session.

Installation dans Foundry :\n\`https://github.com/${{ github.repository }}/releases/latest/download/module.json\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
